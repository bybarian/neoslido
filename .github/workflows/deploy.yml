name: CI/CD Build & Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  # ==========================================
  # 請修改下列設定，以符合您的 GCP 專案配置
  # ==========================================
  GCP_PROJECT_ID: 'ai-studio-applet-webapp-bc93d' # 您的 Google Cloud 專案 ID
  GCP_REGION: 'asia-northeast1'                   # 部署的 Cloud Run 區域 (如 asia-northeast1)
  GCP_SERVICE_NAME: 'ai-interactive-system'        # 您的 Cloud Run 服務名稱
  IMAGE_NAME: 'ai-interactive-system'             # Docker 映像檔名稱

jobs:
  test-and-lint:
    name: 🧪 測試與代碼檢查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Build Test (編譯測試)
        run: npm run build

      - name: Run Typings Lint (代碼編譯檢查)
        run: npm run lint

  build-and-deploy:
    name: 🚀 映像檔打包與 Cloud Run 部署
    needs: test-and-lint
    if: github.event_name == 'push' # 僅在合併/推送至主分支時進行實際部署
    runs-on: ubuntu-latest
    
    # 設置 Workload Identity 權限（若使用推薦的 OIDC 認證）
    permissions:
      contents: 'read'
      id-token: 'write'

    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==============================================================
      # 🔐 Google Cloud 認證與先期檢查
      # ==============================================================
      - name: 🔍 檢查 Google Cloud 驗證金鑰是否配置 (Verify Env Secrets)
        run: |
          if [ -z "$GCP_SA_KEY" ] && [ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ]; then
            echo "::error::❌ 部署終止：未偵測到任何 Google Cloud 認證資訊！請在 GitHub Repository 設置 [Settings] -> [Secrets and variables] -> [Actions]，新增名為 [GCP_SA_KEY] 的 Secret (填入 Service Account JSON 金鑰內容)；或設定 OIDC [GCP_WORKLOAD_IDENTITY_PROVIDER]。"
            exit 1
          fi

      # [認證方式 A]：OIDC Workload Identity (當 GCP_WORKLOAD_IDENTITY_PROVIDER 存在時執行)
      - name: Google Auth (Workload Identity)
        if: env.GCP_WORKLOAD_IDENTITY_PROVIDER != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      # [認證方式 B]：Service Account JSON Key (當 GCP_SA_KEY 存在時執行)
      - name: Google Auth (Service Account Key)
        if: env.GCP_SA_KEY != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      # 啟用 GCP 命令列工具和認證資訊
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 設定 Docker 架構，準備將映像檔 push 至 Google GCR (或 Artifact Registry)
      - name: Configure Docker wrapper for GCR
        run: |
          gcloud auth configure-docker --quiet

      # 本地編譯多平台映像檔機制 (選配，預設提升編譯效能)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ==============================================================
      # 📦 編譯並推動 Docker 映像檔
      # ==============================================================
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==============================================================
      # 🚢 部署至 Google Cloud Run
      # ==============================================================
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.GCP_SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # 允許外部不具備身分驗證者存取 (依需求更改，一般為公開論壇工作坊)
          flags: '--allow-unauthenticated'
          # 設定環境變數
          env_vars: |
            NODE_ENV=production
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
